<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AP Readiness Dashboard — 2026-03-26</title>
<style>
/* ── Reset & Base ────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 13px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #F8F9FA; color: #2C3E50; line-height: 1.45;
}

/* ── Top Bar (sticky) ────────────────────────────────── */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: #2C3E50; color: #fff;
  padding: 10px 24px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.top-bar h1 { font-size: 17px; font-weight: 700; white-space: nowrap; }
.top-bar .snapshot { font-size: 12px; color: #94a3b8; white-space: nowrap; }
.top-bar input[type="search"] {
  padding: 5px 10px; border-radius: 4px; border: 1px solid #4a5568;
  background: #34495E; color: #fff; font-size: 12px; width: 200px;
  outline: none;
}
.top-bar input[type="search"]::placeholder { color: #94a3b8; }
.top-bar input[type="search"]:focus { border-color: #3b82f6; }
.top-bar select {
  padding: 5px 8px; border-radius: 4px; border: 1px solid #4a5568;
  background: #34495E; color: #fff; font-size: 12px; cursor: pointer;
}
.view-toggle { display: flex; gap: 0; }
.view-toggle button {
  padding: 5px 12px; border: 1px solid #4a5568; background: #34495E;
  color: #cbd5e1; font-size: 12px; cursor: pointer; font-weight: 500;
}
.view-toggle button:first-child { border-radius: 4px 0 0 4px; }
.view-toggle button:last-child { border-radius: 0 4px 4px 0; border-left: 0; }
.view-toggle button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
.summary-text { font-size: 12px; color: #94a3b8; margin-left: auto; white-space: nowrap; }

/* ── Legend (collapsible) ────────────────────────────── */
.legend-bar {
  background: #fff; border-bottom: 1px solid #DEE2E6;
  padding: 6px 24px; font-size: 12px; color: #64748b;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.legend-bar.collapsed .legend-items { display: none; }
.legend-toggle {
  cursor: pointer; user-select: none; font-weight: 600; color: #2C3E50;
}
.legend-items { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-swatch {
  display: inline-block; width: 14px; height: 14px; border-radius: 3px;
}
.legend-section { font-weight: 600; color: #475569; margin-left: 8px; }

/* ── Table Container ─────────────────────────────────── */
.table-wrap {
  overflow: auto; max-height: calc(100vh - 90px);
  background: #fff;
}
table {
  width: max-content; min-width: 100%;
  border-collapse: separate; border-spacing: 0;
  font-size: 13px;
}

/* ── Table Head ──────────────────────────────────────── */
thead th {
  position: sticky; top: 0; z-index: 20;
  background: #F1F5F9; color: #475569;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .4px; white-space: nowrap;
  padding: 8px 10px; border-bottom: 2px solid #DEE2E6;
  text-align: left;
}

/* ── Table Body ──────────────────────────────────────── */
td {
  padding: 7px 10px; border-bottom: 1px solid #F1F5F9;
  vertical-align: middle; white-space: nowrap;
}
tr:hover td { background: #F8F9FA; }
/* Alternating student group bands */
tr.group-even td { background: #FAFBFC; }
tr.group-even:hover td { background: #F1F5F9; }

/* Sticky left columns */
th.sticky-left, td.sticky-left {
  position: sticky; left: 0; z-index: 10;
  background: inherit;
}
td.sticky-left { background: #fff; }
tr.group-even td.sticky-left { background: #FAFBFC; }
tr:hover td.sticky-left { background: #F8F9FA; }
tr.group-even:hover td.sticky-left { background: #F1F5F9; }
/* second sticky col offset */
th.sticky-left-2, td.sticky-left-2 {
  position: sticky; left: 150px; z-index: 10;
  background: inherit;
  border-right: 2px solid #E2E8F0;
}
td.sticky-left-2 { background: #fff; }
tr.group-even td.sticky-left-2 { background: #FAFBFC; }
tr:hover td.sticky-left-2 { background: #F8F9FA; }
tr.group-even:hover td.sticky-left-2 { background: #F1F5F9; }

/* Merged cells vertical alignment */
td[rowspan] { vertical-align: top; font-weight: 600; }

/* ── Badges ──────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 11px; font-weight: 600; line-height: 1.4;
}

/* Platform badges */
.badge-timeback   { background: #4A90D9; color: #fff; }
.badge-edmentum   { background: #E67E22; color: #fff; }
.badge-crush_ap   { background: #E74C3C; color: #fff; }
.badge-mathacademy { background: #27AE60; color: #fff; }
.badge-runestone  { background: #8E44AD; color: #fff; }

/* Accuracy badge tiers */
.acc-green  { background: #D1FAE5; color: #065F46; }
.acc-yellow { background: #FEF3C7; color: #92400E; }
.acc-red    { background: #FEE2E2; color: #991B1B; }

/* Exam status icons */
.exam-icon { font-size: 14px; margin-right: 3px; }
.exam-confirmed .exam-icon { color: #27AE60; }
.exam-questionable .exam-icon { color: #E67E22; }

/* ── Completion Cell ─────────────────────────────────── */
.completion-cell { text-align: right; position: relative; }
.completion-num { font-weight: 700; font-size: 13px; }
.completion-bar {
  height: 3px; border-radius: 2px; margin-top: 3px;
  background: #E2E8F0; overflow: hidden;
}
.completion-bar-fill { height: 100%; border-radius: 2px; }
.comp-green .completion-num { color: #065F46; }
.comp-green .completion-bar-fill { background: #27AE60; }
.comp-yellow .completion-num { color: #92400E; }
.comp-yellow .completion-bar-fill { background: #F1C40F; }
.comp-red .completion-num { color: #991B1B; }
.comp-red .completion-bar-fill { background: #E74C3C; }

/* ── Unit Blocks ─────────────────────────────────────── */
.unit-blocks { display: flex; flex-wrap: wrap; gap: 2px; min-width: 200px; }
.ub {
  width: 16px; height: 16px; border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; color: #fff;
  cursor: default; flex-shrink: 0;
}
.ub-complete     { background: #27AE60; }
.ub-complete-low { background: #E74C3C; }
.ub-complete-na  { background: #BDC3C7; }
.ub-progress     { background: #F1C40F; color: #7C6E00; }
.ub-empty        { background: #ECF0F1; border: 1px solid #DEE2E6; }
.ub-exempt       { background: #60A5FA; opacity: 0.6; }
.ub-no-data { color: #9CA3AF; font-style: italic; font-size: 11px; white-space: nowrap; }

/* ── Time coloring ───────────────────────────────────── */
.time-green  { color: #065F46; font-weight: 600; }
.time-orange { color: #92400E; }
.time-red    { color: #991B1B; font-weight: 600; }
.eff-green   { color: #065F46; }
.eff-yellow  { color: #92400E; }
.eff-red     { color: #991B1B; font-weight: 600; }

/* AP score */
.ap-score { font-weight: 700; }
.ap-green  { color: #065F46; }
.ap-yellow { color: #92400E; }
.ap-red    { color: #991B1B; }

/* Practice test placeholder */
.no-test { color: #9CA3AF; font-style: italic; }

/* Exam-only placeholder */
.exam-only-placeholder {
  color: #9CA3AF; font-style: italic; font-size: 12px;
  padding: 4px 0;
}

/* Course group header (By Course view) */
.course-group-header td {
  background: #2C3E50 !important; color: #fff; font-weight: 700;
  font-size: 13px; padding: 8px 10px;
}

/* Print */
@media print {
  .top-bar, .legend-bar { position: static; }
  .table-wrap { max-height: none; overflow: visible; }
  .ub, .badge, .completion-bar-fill {
    print-color-adjust: exact; -webkit-print-color-adjust: exact;
  }
}
</style>

// ── Helpers ─────────────────────────────────────
const esc = s => {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
};
const fmt = (v, dec=1) => v == null ? '—' : Number(v).toFixed(dec);
const fmtPct = v => v == null ? '—' : Number(v).toFixed(1) + '%';

function accBadge(v) {
  if (v == null) return '<span class="badge" style="background:#F1F5F9;color:#94A3B8">—</span>';
  const n = Number(v);
  const cls = n >= 80 ? 'acc-green' : n >= 65 ? 'acc-yellow' : 'acc-red';
  return `<span class="badge ${cls}">${n.toFixed(1)}%</span>`;
}

function completionCell(v) {
  if (v == null) return '<div class="completion-cell"><span class="completion-num" style="color:#94A3B8">—</span></div>';
  const n = Number(v);
  const tier = n >= 75 ? 'comp-green' : n >= 40 ? 'comp-yellow' : 'comp-red';
  return `<div class="completion-cell ${tier}">
    <span class="completion-num">${n.toFixed(1)}%</span>
    <div class="completion-bar"><div class="completion-bar-fill" style="width:${Math.min(n,100)}%"></div></div>
  </div>`;
}

function platformBadge(p) {
  const labels = {timeback:'Timeback',edmentum:'Edmentum',crush_ap:'Crush AP',mathacademy:'MathAcademy',runestone:'Runestone'};
  return `<span class="badge badge-${esc(p)}">${esc(labels[p]||p)}</span>`;
}

function unitBlocks(units) {
  if (!units || !units.length) return '<span class="ub-no-data">No unit data</span>';
  return '<div class="unit-blocks">' + units.map(u => {
    const s = u.status || 'NOT_STARTED';
    const src = u.completion_source || 'native';
    const isExempt = src !== 'native' && src.indexOf('exempt') === -1 && src !== 'native'
      ? true  // specific source like edmentum_transfer, test_out
      : src.includes('exempt') || src.includes('transfer') || src.includes('test_out');

    let cls = 'ub-empty';
    let inner = '';

    if (isExempt && s !== 'NOT_STARTED') {
      cls = 'ub-exempt';
      inner = 'E';
    } else if (s === 'COMPLETE') cls = 'ub-complete';
    else if (s === 'COMPLETE_LOW_ACC') cls = 'ub-complete-low';
    else if (s === 'IN_PROGRESS') { cls = 'ub-progress'; inner = u.completion_pct != null ? Math.round(u.completion_pct) : ''; }
    else if (s === 'NOT_STARTED') cls = 'ub-empty';

    // completed with null accuracy (native only)
    if (!isExempt && (s === 'COMPLETE' || s === 'COMPLETE_LOW_ACC') && u.accuracy == null) cls = 'ub-complete-na';

    const lines = [`Unit ${u.unit_num != null ? u.unit_num : '?'}: ${u.unit_name}`];
    lines.push(`Status: ${s.replace(/_/g,' ')}`);
    if (isExempt) {
      const label = src.replace(/_/g,' ').replace('partial ','');
      lines.push(`Source: ${label}`);
    }
    if (u.completion_pct != null) lines.push(`Completion: ${u.completion_pct.toFixed(1)}%`);
    if (u.items_completed != null && u.items_total != null) lines.push(`Items: ${Math.round(u.items_completed)}/${Math.round(u.items_total)}`);
    lines.push(`Accuracy: ${u.accuracy != null ? u.accuracy.toFixed(1)+'%' : '—'}`);
    if (u.mcq_accuracy != null) lines.push(`MCQ: ${u.mcq_accuracy.toFixed(1)}%`);
    if (u.frq_accuracy != null) lines.push(`FRQ: ${u.frq_accuracy.toFixed(1)}%`);

    return `<span class="ub ${cls}" title="${esc(lines.join('\n'))}">${inner}</span>`;
  }).join('') + '</div>';
}

function timeCell(v) {
  if (v == null) return '<td>—</td>';
  const n = Number(v);
  const cls = n >= 180 ? 'time-green' : n >= 60 ? 'time-orange' : 'time-red';
  return `<td class="${cls}">${n.toFixed(1)}</td>`;
}

function effCell(v) {
  if (v == null) return '<td>—</td>';
  const n = Number(v);
  const cls = n < 0.5 ? 'eff-green' : n <= 1.0 ? 'eff-yellow' : 'eff-red';
  return `<td class="${cls}">${n.toFixed(2)}</td>`;
}

function apScoreCell(v) {
  if (v == null) return '<td>—</td>';
  const n = Math.round(Number(v));
  const cls = n >= 4 ? 'ap-green' : n === 3 ? 'ap-yellow' : 'ap-red';
  return `<td class="ap-score ${cls}">${n}</td>`;
}

function examIcon(status) {
  if (status === 'confirmed') return '<span class="exam-icon">&#10003;</span>';
  return '<span class="exam-icon">?</span>';
}

// ── Filtering ───────────────────────────────────
// Filters operate on exam-level records; course-dependent filters check nested courses.
function applyFilters(data) {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const f = document.getElementById('filter').value;
  let out = data;
  if (q) out = out.filter(r => r.student_name.toLowerCase().includes(q));
  if (f === 'no_practice') out = out.filter(r => !r.practice_test_name);
  else if (f === 'low_activity') out = out.filter(r =>
    r.courses.some(c => c.time_1w_min_per_day != null && c.time_1w_min_per_day < 60));
  else if (f === 'practice_mcq_low') out = out.filter(r => r.practice_mcq_accuracy != null && r.practice_mcq_accuracy < 80);
  else if (f === 'practice_frq_low') out = out.filter(r => r.practice_frq_accuracy != null && r.practice_frq_accuracy < 80);
  else if (f === 'questionable') out = out.filter(r => r.exam_status === 'questionable');
  else if (f === 'at_risk') out = out.filter(r =>
    r.courses.some(c => c.pacing_status === 'AT_RISK'));
  else if (f === 'complete') out = out.filter(r =>
    r.courses.length > 0 && r.courses.every(c => c.pacing_status === 'COMPLETE'));
  return out;
}

// ── Flatten exams into renderable rows ──────────
// Each exam produces max(1, courses.length) rows for the table.
function flattenToRows(data) {
  const rows = [];
  for (const exam of data) {
    if (exam.courses.length === 0) {
      // Exam-only row (e.g. AP Stats — no course mapping)
      rows.push({ exam, course: null, isExamOnly: true });
    } else {
      for (const course of exam.courses) {
        rows.push({ exam, course, isExamOnly: false });
      }
    }
  }
  return rows;
}

function renderByStudent(data) {

  data = [...data].sort((a,b) =>

    a.ap_test.localeCompare(b.ap_test)
  );

  const flat = flattenToRows(data);

  // Compute group spans
  // Student group: spans all rows for that student
  // Exam group: spans all course rows for that exam (min 1)
  const studentGroups = []; // [{start, count, exam}]
  const examGroups = [];    // [{start, count, exam}]

  let si = 0;
  while (si < flat.length) {
    const sid = flat[si].exam.student_alpha_id;
    const sStart = si;
    while (si < flat.length && flat[si].exam.student_alpha_id === sid) {
      const eStart = si;
      const eTest = flat[si].exam.ap_test;
      while (si < flat.length && flat[si].exam.student_alpha_id === sid && flat[si].exam.ap_test === eTest) si++;
      examGroups.push({start: eStart, count: si - eStart, exam: flat[eStart].exam});
    }
    studentGroups.push({start: sStart, count: si - sStart, exam: flat[sStart].exam});
  }

  // Build header — three-level: Student | Exam + Practice | Course
  const thead = document.querySelector('#mainTable thead');

    <th style="min-width:70px">MCQ</th>
    <th style="min-width:70px">FRQ</th>
    <th style="min-width:80px">Min/day 1W</th>
    <th style="min-width:80px">Min/day 4W</th>
    <th style="min-width:70px">XP/d 1W</th>

    <th style="min-width:60px">Min/XP 1W</th>
    <th style="min-width:60px">Min/XP 4W</th>
  </tr>`;

  // Build lookup sets for rowspan detection
  const sGroupOf = new Array(flat.length);
  studentGroups.forEach((g,gi) => { for (let i=g.start; i<g.start+g.count; i++) sGroupOf[i]=gi; });
  const eGroupStart = new Set(examGroups.map(g=>g.start));
  const eGroupMap = {};
  examGroups.forEach(g => { eGroupMap[g.start] = g; });
  const sGroupStart = new Set(studentGroups.map(g=>g.start));
  const sGroupMap = {};
  studentGroups.forEach(g => { sGroupMap[g.start] = g; });

  // Number of course-level columns (Course through Min/XP 4W)
  const COURSE_COLS = 13;

  // Build rows
  const tbody = document.querySelector('#mainTable tbody');
  let html = '';
  for (let i = 0; i < flat.length; i++) {
    const {exam, course, isExamOnly} = flat[i];
    const groupParity = sGroupOf[i] % 2 === 0 ? '' : 'group-even';
    let row = `<tr class="${groupParity}">`;

    // Student columns (merged across all rows for this student)
    if (sGroupStart.has(i)) {
      const sg = sGroupMap[i];
      row += `<td class="sticky-left" rowspan="${sg.count}" style="min-width:150px">${esc(sg.exam.student_name)}</td>`;
      row += `<td class="sticky-left-2" rowspan="${sg.count}" style="min-width:100px">${esc(sg.exam.campus)}</td>`;
      row += `<td rowspan="${sg.count}">${esc(sg.exam.grade)}</td>`;
      row += `<td rowspan="${sg.count}">${esc(sg.exam.guide)}</td>`;
    }

    // Exam + Practice test columns (merged across courses for this exam)
    if (eGroupStart.has(i)) {
      const eg = eGroupMap[i];
      const statusCls = eg.exam.exam_status === 'confirmed' ? 'exam-confirmed' : 'exam-questionable';
      row += `<td rowspan="${eg.count}" class="${statusCls}">

      row += `<td rowspan="${eg.count}">${eg.exam.practice_test_name ? esc(eg.exam.practice_test_name) : '<span class="no-test">No practice test</span>'}</td>`;

    if (isExamOnly) {

  const totalCourses = filtered.reduce((s, r) => s + Math.max(r.courses.length, 1), 0);
  document.getElementById('summary').textContent =
    `Showing ${students.size} of ${new Set(DATA.map(r=>r.student_alpha_id)).size} students, ${filtered.length} exams, ${totalCourses} rows`;

  if (viewMode === 'student') renderByStudent(filtered);
  else renderByCourse(filtered);
}

// ── Event listeners ─────────────────────────────
document.getElementById('search').addEventListener('input', render);
document.getElementById('filter').addEventListener('change', render);
document.getElementById('btn-student').addEventListener('click', () => {
  viewMode = 'student';
  document.getElementById('btn-student').classList.add('active');
  document.getElementById('btn-course').classList.remove('active');
  render();
});
document.getElementById('btn-course').addEventListener('click', () => {
  viewMode = 'course';
  document.getElementById('btn-course').classList.add('active');
  document.getElementById('btn-student').classList.remove('active');
  render();
});

// Initial render
render();
</script>
</body>
</html>
