<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AP Readiness Dashboard — 2026-04-15</title>
<style>
/* ── Reset & Base ────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 13px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #F8F9FA; color: #2C3E50; line-height: 1.45;
}

/* ── Top Bar (sticky) ────────────────────────────────── */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: #2C3E50; color: #fff;
  padding: 10px 24px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.top-bar h1 { font-size: 17px; font-weight: 700; white-space: nowrap; }
.top-bar .snapshot { font-size: 12px; color: #94a3b8; white-space: nowrap; }
.top-bar input[type="search"] {
  padding: 5px 10px; border-radius: 4px; border: 1px solid #4a5568;
  background: #34495E; color: #fff; font-size: 12px; width: 200px;
  outline: none;
}
.top-bar input[type="search"]::placeholder { color: #94a3b8; }
.top-bar input[type="search"]:focus { border-color: #3b82f6; }
.top-bar select {
  padding: 5px 8px; border-radius: 4px; border: 1px solid #4a5568;
  background: #34495E; color: #fff; font-size: 12px; cursor: pointer;
}
.view-toggle { display: flex; gap: 0; }
.view-toggle button {
  padding: 5px 12px; border: 1px solid #4a5568; background: #34495E;
  color: #cbd5e1; font-size: 12px; cursor: pointer; font-weight: 500;
}
.view-toggle button:first-child { border-radius: 4px 0 0 4px; }
.view-toggle button:last-child { border-radius: 0 4px 4px 0; }
.view-toggle button:not(:first-child):not(:last-child) { border-left: 0; }
.view-toggle button:last-child { border-left: 0; }
.view-toggle button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
.summary-text { font-size: 12px; color: #94a3b8; margin-left: auto; white-space: nowrap; }

/* ── Legend (collapsible) ────────────────────────────── */
.legend-bar {
  background: #fff; border-bottom: 1px solid #DEE2E6;
  padding: 6px 24px; font-size: 12px; color: #64748b;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.legend-bar.collapsed .legend-items { display: none; }
.legend-toggle {
  cursor: pointer; user-select: none; font-weight: 600; color: #2C3E50;
}
.legend-items { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-swatch {
  display: inline-block; width: 14px; height: 14px; border-radius: 3px;
}
.legend-section { font-weight: 600; color: #475569; margin-left: 8px; }

/* ── Table Container ─────────────────────────────────── */
.table-wrap {
  overflow: auto; max-height: calc(100vh - 90px);
  background: #fff;
}
table {
  width: max-content; min-width: 100%;
  border-collapse: separate; border-spacing: 0;
  font-size: 13px;
}

/* ── Table Head ──────────────────────────────────────── */
thead th {
  position: sticky; top: 0; z-index: 20;
  background: #F1F5F9; color: #475569;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .4px; white-space: nowrap;
  padding: 8px 10px; border-bottom: 2px solid #DEE2E6;
  text-align: left;
}
/* Group header row (row 1 of 2-row header) */
thead tr.group-header-row th {
  text-align: center; font-size: 11px; font-weight: 700;
  letter-spacing: .5px; text-transform: uppercase;
  padding: 6px 10px; border-bottom: 3px solid;
}
thead tr.group-header-row th { top: 0; }
thead tr.col-header-row th { top: 30px; }
.grp-identity   { background: #F1F5F9; border-bottom-color: #94A3B8 !important; color: #475569; }
.grp-progress   { background: #ECFDF5; border-bottom-color: #27AE60 !important; color: #065F46; }
.grp-effort     { background: #EFF6FF; border-bottom-color: #3B82F6 !important; color: #1E40AF; }
.grp-ap-score   { background: #F5F3FF; border-bottom-color: #8E44AD !important; color: #581C87; }
.grp-pacing     { background: #FEF2F2; border-bottom-color: #E74C3C !important; color: #991B1B; }

/* ── Table Body ──────────────────────────────────────── */
td {
  padding: 7px 10px; border-bottom: 1px solid #F1F5F9;
  vertical-align: middle; white-space: nowrap;
}
tr:hover td { background: #F8F9FA; }
/* Alternating student group bands */
tr.group-even td { background: #FAFBFC; }
tr.group-even:hover td { background: #F1F5F9; }

/* Sticky left columns — body cells */
td.sticky-left {
  position: sticky; left: 0; z-index: 10;
  background: #fff;
}
tr.group-even td.sticky-left { background: #FAFBFC; }
tr:hover td.sticky-left { background: #F8F9FA; }
tr.group-even:hover td.sticky-left { background: #F1F5F9; }
td.sticky-left-2 {
  position: sticky; left: 150px; z-index: 10;
  background: #fff;
  border-right: 2px solid #E2E8F0;
}
tr.group-even td.sticky-left-2 { background: #FAFBFC; }
tr:hover td.sticky-left-2 { background: #F8F9FA; }
tr.group-even:hover td.sticky-left-2 { background: #F1F5F9; }
/* Sticky left columns — header cells (corner: sticky top + left, highest z-index) */
thead th.sticky-left {
  position: sticky; left: 0; z-index: 30;
  background: #F1F5F9;
}
thead th.sticky-left-2 {
  position: sticky; left: 150px; z-index: 30;
  background: #F1F5F9;
  border-right: 2px solid #E2E8F0;
}
thead tr.group-header-row th.sticky-left {
  background: #F1F5F9;
}

/* Merged cells vertical alignment */
td[rowspan] { vertical-align: top; font-weight: 600; }

/* ── Badges ──────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 11px; font-weight: 600; line-height: 1.4;
}

/* Platform badges */
.badge-timeback   { background: #4A90D9; color: #fff; }
.badge-edmentum   { background: #E67E22; color: #fff; }
.badge-crush_ap   { background: #E74C3C; color: #fff; }
.badge-mathacademy { background: #27AE60; color: #fff; }
.badge-runestone  { background: #8E44AD; color: #fff; }

/* Accuracy badge tiers */
.acc-green  { background: #D1FAE5; color: #065F46; }
.acc-yellow { background: #FEF3C7; color: #92400E; }
.acc-red    { background: #FEE2E2; color: #991B1B; }

/* Exam status icons */
.exam-icon { font-size: 14px; margin-right: 3px; }
.exam-confirmed .exam-icon { color: #27AE60; }
.exam-questionable .exam-icon { color: #E67E22; }

/* ── Completion Cell ─────────────────────────────────── */
.completion-cell { text-align: right; position: relative; }
.completion-num { font-weight: 700; font-size: 13px; }
.completion-bar {
  height: 3px; border-radius: 2px; margin-top: 3px;
  background: #E2E8F0; overflow: hidden;
}
.completion-bar-fill { height: 100%; border-radius: 2px; }
.comp-green .completion-num { color: #065F46; }
.comp-green .completion-bar-fill { background: #27AE60; }
.comp-yellow .completion-num { color: #92400E; }
.comp-yellow .completion-bar-fill { background: #F1C40F; }
.comp-red .completion-num { color: #991B1B; }
.comp-red .completion-bar-fill { background: #E74C3C; }

/* ── Unit Blocks ─────────────────────────────────────── */
.unit-blocks { display: flex; flex-wrap: wrap; gap: 2px; min-width: 200px; }
.ub {
  width: 16px; height: 16px; border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; color: #fff;
  cursor: default; flex-shrink: 0;
}
.ub-complete     { background: #27AE60; }
.ub-complete-low { background: #E74C3C; }
.ub-complete-na  { background: #BDC3C7; }
.ub-progress     { background: #F1C40F; color: #7C6E00; }
.ub-empty        { background: #ECF0F1; border: 1px solid #DEE2E6; }
.ub-exempt       { background: #60A5FA; opacity: 0.6; }
.ub-no-data { color: #9CA3AF; font-style: italic; font-size: 11px; white-space: nowrap; }

/* ── Time coloring ───────────────────────────────────── */
.time-green  { color: #065F46; font-weight: 600; }
.time-orange { color: #92400E; }
.time-red    { color: #991B1B; font-weight: 600; }
.eff-green   { color: #065F46; }
.eff-yellow  { color: #92400E; }
.eff-red     { color: #991B1B; font-weight: 600; }

/* AP score */
.ap-score { font-weight: 700; }
.ap-green  { color: #065F46; }
.ap-yellow { color: #92400E; }
.ap-red    { color: #991B1B; }

/* No-data placeholder */
.no-test { color: #9CA3AF; font-style: italic; }

/* Exam-only placeholder */
.exam-only-placeholder {
  color: #9CA3AF; font-style: italic; font-size: 12px;
  padding: 4px 0;
}

/* ── Last Active coloring ─────────────────────────────── */
.last-active-red    { color: #991B1B; font-weight: 600; }
.last-active-orange { color: #92400E; }
.last-active-green  { color: #065F46; }
.last-active-gray   { color: #9CA3AF; }

/* ── Pacing (XP/day needed) ───────────────────────────── */
.pacing-green  { color: #065F46; font-weight: 600; }
.pacing-yellow { color: #92400E; font-weight: 600; }
.pacing-red    { color: #991B1B; font-weight: 700; }

/* Course + platform cell */
.course-platform-badge {
  margin-top: 2px; font-size: 11px;
}

/* Course group header (By Course view) */
.course-group-header td {
  background: #2C3E50 !important; color: #fff; font-weight: 700;
  font-size: 13px; padding: 8px 10px;
}

/* Print */
@media print {
  .top-bar, .legend-bar { position: static; }
  .table-wrap { max-height: none; overflow: visible; }
  .ub, .badge, .completion-bar-fill {
    print-color-adjust: exact; -webkit-print-color-adjust: exact;
  }
}
</style>

// ── Helpers ─────────────────────────────────────
const esc = s => {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
};
const fmt = (v, dec=1) => v == null ? '\u2014' : Number(v).toFixed(dec);
const fmtPct = v => v == null ? '\u2014' : Number(v).toFixed(1) + '%';

function accBadge(v, mcq, frq) {
  if (v == null) return '<span class="badge" style="background:#F1F5F9;color:#94A3B8">\u2014</span>';
  const n = Number(v);
  const cls = n >= 80 ? 'acc-green' : n >= 65 ? 'acc-yellow' : 'acc-red';
  let title = '';
  if (mcq != null || frq != null) {
    const parts = [];
    if (mcq != null) parts.push('MCQ: ' + Number(mcq).toFixed(1) + '%');
    if (frq != null) parts.push('FRQ: ' + Number(frq).toFixed(1) + '%');
    title = ` title="${esc(parts.join(' | '))}"`;
  }
  return `<span class="badge ${cls}"${title}>${n.toFixed(1)}%</span>`;
}

function accBadgeSimple(v) {
  if (v == null) return '<span class="badge" style="background:#F1F5F9;color:#94A3B8">\u2014</span>';
  const n = Number(v);
  const cls = n >= 80 ? 'acc-green' : n >= 65 ? 'acc-yellow' : 'acc-red';
  return `<span class="badge ${cls}">${n.toFixed(1)}%</span>`;
}

function completionCell(v) {
  if (v == null) return '<div class="completion-cell"><span class="completion-num" style="color:#94A3B8">\u2014</span></div>';
  const n = Number(v);
  const tier = n >= 75 ? 'comp-green' : n >= 40 ? 'comp-yellow' : 'comp-red';
  return `<div class="completion-cell ${tier}">
    <span class="completion-num">${n.toFixed(1)}%</span>
    <div class="completion-bar"><div class="completion-bar-fill" style="width:${Math.min(n,100)}%"></div></div>
  </div>`;
}

function platformBadge(p) {
  const labels = {timeback:'Timeback',edmentum:'Edmentum',crush_ap:'Crush AP',mathacademy:'MathAcademy',runestone:'Runestone'};
  return `<span class="badge badge-${esc(p)}">${esc(labels[p]||p)}</span>`;
}

function coursePlatformCell(courseName, platform) {
  return `<td>${esc(courseName)}<div class="course-platform-badge">${platformBadge(platform)}</div></td>`;
}

function unitBlocks(units) {
  if (!units || !units.length) return '<span class="ub-no-data">No unit data</span>';
  return '<div class="unit-blocks">' + units.map(u => {
    const s = u.status || 'NOT_STARTED';
    const src = u.completion_source || 'native';
    const isExempt = src !== 'native' && (
      src.includes('exempt') || src.includes('transfer') || src.includes('test_out') || src.includes('manual_complete')
    );

    let cls = 'ub-empty';
    let inner = '';

    if (isExempt && s !== 'NOT_STARTED') {
      cls = 'ub-exempt';
      inner = 'E';
    } else if (s === 'COMPLETE') cls = 'ub-complete';
    else if (s === 'COMPLETE_LOW_ACC') cls = 'ub-complete-low';
    else if (s === 'IN_PROGRESS') { cls = 'ub-progress'; inner = u.completion_pct != null ? Math.round(u.completion_pct) : ''; }
    else if (s === 'NOT_STARTED') cls = 'ub-empty';

    if (!isExempt && (s === 'COMPLETE' || s === 'COMPLETE_LOW_ACC') && u.accuracy == null) cls = 'ub-complete-na';

    const lines = [`Unit ${u.unit_num != null ? u.unit_num : '?'}: ${u.unit_name}`];
    lines.push(`Status: ${s.replace(/_/g,' ')}`);
    if (isExempt) {
      const label = src.replace(/_/g,' ').replace('partial ','');
      lines.push(`Source: ${label}`);
    }
    if (u.completion_pct != null) lines.push(`Completion: ${u.completion_pct.toFixed(1)}%`);
    if (u.items_completed != null && u.items_total != null) lines.push(`Items: ${Math.round(u.items_completed)}/${Math.round(u.items_total)}`);
    lines.push(`Accuracy: ${u.accuracy != null ? u.accuracy.toFixed(1)+'%' : '\u2014'}`);
    if (u.mcq_accuracy != null) lines.push(`MCQ: ${u.mcq_accuracy.toFixed(1)}%`);
    if (u.frq_accuracy != null) lines.push(`FRQ: ${u.frq_accuracy.toFixed(1)}%`);

    return `<span class="ub ${cls}" title="${esc(lines.join('\n'))}">${inner}</span>`;
  }).join('') + '</div>';
}

function timeCell(v) {
  if (v == null) return '<td>\u2014</td>';
  const n = Number(v);
  const cls = n >= 180 ? 'time-green' : n >= 60 ? 'time-orange' : 'time-red';
  return `<td class="${cls}">${n.toFixed(1)}</td>`;
}

function effCell(v) {
  if (v == null) return '<td>\u2014</td>';
  const n = Number(v);
  const cls = n < 0.5 ? 'eff-green' : n <= 1.0 ? 'eff-yellow' : 'eff-red';
  return `<td class="${cls}">${n.toFixed(2)}</td>`;
}

function apScoreCell(v, exam) {
  if (v == null) return '<td>\u2014</td>';
  const n = Math.round(Number(v));
  const cls = n >= 4 ? 'ap-green' : n === 3 ? 'ap-yellow' : 'ap-red';

  // Build tooltip with best/latest details if available
  const lines = [`Best: ${n}`];
  if (exam) {
    if (exam.best_practice_date) lines.push(`Date: ${exam.best_practice_date}`);
    if (exam.best_practice_test_type) lines.push(`Type: ${exam.best_practice_test_type}`);
    if (exam.best_practice_mcq_accuracy != null) lines.push(`MCQ: ${Number(exam.best_practice_mcq_accuracy).toFixed(1)}%`);
    if (exam.best_practice_frq_accuracy != null) lines.push(`FRQ: ${Number(exam.best_practice_frq_accuracy).toFixed(1)}%`);
    if (exam.latest_practice_ap_score != null && exam.latest_practice_ap_score !== exam.best_practice_ap_score) {
      lines.push('');
      lines.push(`Latest: ${Math.round(Number(exam.latest_practice_ap_score))}`);
      if (exam.latest_practice_date) lines.push(`Date: ${exam.latest_practice_date}`);
    }
    if (exam.practice_test_count != null) lines.push(`Tests: ${Math.round(exam.practice_test_count)}`);
  }

  const title = lines.length > 1 ? ` title="${esc(lines.join('\n'))}"` : '';
  return `<td class="ap-score ${cls}"${title}>${n}</td>`;
}

function examIcon(status) {
  if (status === 'confirmed') return '<span class="exam-icon">&#10003;</span>';
  return '<span class="exam-icon">?</span>';
}

function lastActiveCell(dateStr) {
  if (!dateStr || dateStr === '\u2014') return '<td class="last-active-gray">\u2014</td>';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return '<td class="last-active-gray">\u2014</td>';
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((today - d) / 86400000);
  const cls = diff > 7 ? 'last-active-red' : diff >= 3 ? 'last-active-orange' : 'last-active-green';
  const label = dateStr.slice(5);
  return `<td class="${cls}">${label}</td>`;
}

function pacingCell(v) {
  if (v == null) return '<td>\u2014</td>';
  const n = Number(v);
  const cls = n <= 60 ? 'pacing-green' : n <= 100 ? 'pacing-yellow' : 'pacing-red';
  return `<td class="${cls}">${n.toFixed(1)}</td>`;
}

(function populateFilters() {
  const guides = [...new Set(DATA.map(r => r.guide).filter(Boolean))].sort();
  const apTests = [...new Set(DATA.map(r => r.ap_test).filter(Boolean))].sort();
  const gSel = document.getElementById('filterGuide');
  guides.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; gSel.appendChild(o); });
  const aSel = document.getElementById('filterApTest');
  apTests.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; aSel.appendChild(o); });
})();

// ── Filtering ───────────────────────────────────
function applyFilters(data) {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const f = document.getElementById('filter').value;
  const guide = document.getElementById('filterGuide').value;
  const apTest = document.getElementById('filterApTest').value;
  let out = data;
  if (q) out = out.filter(r => r.student_name.toLowerCase().includes(q));
  if (guide) out = out.filter(r => r.guide === guide);
  if (apTest) out = out.filter(r => r.ap_test === apTest);
  if (f === 'no_practice') out = out.filter(r => r.best_ap_score == null);
  else if (f === 'low_activity') out = out.filter(r =>
    r.courses.some(c => c.time_4w_min_per_day != null && c.time_4w_min_per_day < 60));
  else if (f === 'questionable') out = out.filter(r => r.exam_status === 'questionable');
  else if (f === 'at_risk') out = out.filter(r =>
    r.courses.some(c => c.xp_needed_per_day != null && c.xp_needed_per_day > 100));
  else if (f === 'complete') out = out.filter(r =>
    r.courses.length > 0 && r.courses.every(c => c.completion_pct != null && c.completion_pct >= 95));
  return out;
}

function applyFiltersPractice(data) {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const guide = document.getElementById('filterGuide').value;
  const apTest = document.getElementById('filterApTest').value;
  let out = data;
  if (q) out = out.filter(r => r.student_name.toLowerCase().includes(q));
  if (guide) out = out.filter(r => r.guide === guide);
  if (apTest) out = out.filter(r => r.ap_test === apTest);
  return out;
}

// ── Flatten exams into renderable rows ──────────
function flattenToRows(data) {
  const rows = [];
  for (const exam of data) {
    if (exam.courses.length === 0) {
      rows.push({ exam, course: null, isExamOnly: true });
    } else {
      for (const course of exam.courses) {
        rows.push({ exam, course, isExamOnly: false });
      }
    }
  }
  return rows;
}

// Number of per-row course columns (Course through Last Active = 8)
const PER_ROW_COLS = 8;

// ── Render: By Student ──────────────────────────
function renderByStudent(data) {
  data = [...data].sort((a,b) =>
    a.student_name.localeCompare(b.student_name) ||
    a.ap_test.localeCompare(b.ap_test)
  );

  const flat = flattenToRows(data);

  // Compute group spans
  const studentGroups = [];
  const examGroups = [];

  let si = 0;
  while (si < flat.length) {
    const sid = flat[si].exam.student_alpha_id;
    const sStart = si;
    while (si < flat.length && flat[si].exam.student_alpha_id === sid) {
      const eStart = si;
      const eTest = flat[si].exam.ap_test;
      while (si < flat.length && flat[si].exam.student_alpha_id === sid && flat[si].exam.ap_test === eTest) si++;
      examGroups.push({start: eStart, count: si - eStart, exam: flat[eStart].exam});
    }
    studentGroups.push({start: sStart, count: si - sStart, exam: flat[sStart].exam});
  }

  const thead = document.querySelector('#mainTable thead');
  thead.innerHTML = MAIN_GROUP_HEADER + MAIN_COL_HEADER;

  // Build lookup sets for rowspan
  const sGroupOf = new Array(flat.length);
  studentGroups.forEach((g,gi) => { for (let i=g.start; i<g.start+g.count; i++) sGroupOf[i]=gi; });
  const eGroupStart = new Set(examGroups.map(g=>g.start));
  const eGroupMap = {};
  examGroups.forEach(g => { eGroupMap[g.start] = g; });
  const sGroupStart = new Set(studentGroups.map(g=>g.start));
  const sGroupMap = {};
  studentGroups.forEach(g => { sGroupMap[g.start] = g; });

  const tbody = document.querySelector('#mainTable tbody');
  let html = '';
  for (let i = 0; i < flat.length; i++) {
    const {exam, course, isExamOnly} = flat[i];
    const groupParity = sGroupOf[i] % 2 === 0 ? '' : 'group-even';
    let row = `<tr class="${groupParity}">`;

    // Student columns (rowspan student): Student Name, Grade, Guide
    if (sGroupStart.has(i)) {
      const sg = sGroupMap[i];
      row += `<td class="sticky-left" rowspan="${sg.count}" style="min-width:150px">${esc(sg.exam.student_name)}</td>`;
      row += `<td class="sticky-left-2" rowspan="${sg.count}" style="min-width:50px">${esc(sg.exam.grade)}</td>`;
      row += `<td rowspan="${sg.count}">${esc(sg.exam.guide)}</td>`;
    }

    // AP Test column (rowspan exam) + status icon + date
    if (eGroupStart.has(i)) {
      const eg = eGroupMap[i];
      const statusCls = eg.exam.exam_status === 'confirmed' ? 'exam-confirmed' : 'exam-questionable';
      row += `<td rowspan="${eg.count}" class="${statusCls}">
        ${examIcon(eg.exam.exam_status)}${esc(eg.exam.ap_test)}
        <div style="font-size:11px;color:#94a3b8;font-weight:400;margin-top:2px">${esc(eg.exam.exam_date)}</div>
      </td>`;
    }

    // Course-level columns (per row)
    if (isExamOnly) {
      row += `<td colspan="${PER_ROW_COLS}" class="exam-only-placeholder">No course tracking \u2014 exam only</td>`;
    } else {
      // Course + Platform badge below
      row += coursePlatformCell(course.course, course.platform);
      // Progress
      row += `<td>${completionCell(course.completion_pct)}</td>`;
      row += `<td style="white-space:normal">${unitBlocks(course.units)}</td>`;
      row += `<td>${accBadge(course.accuracy, course.mcq_accuracy, course.frq_accuracy)}</td>`;
      // Effort
      row += timeCell(course.time_4w_min_per_day);
      row += `<td>${course.xp_per_school_day_4w != null ? fmt(course.xp_per_school_day_4w,1) : '\u2014'}</td>`;
      row += effCell(course.min_per_xp_4w);
      row += lastActiveCell(course.last_active);
    }

    // Best AP Score (rowspan exam)
    if (eGroupStart.has(i)) {
      const eg = eGroupMap[i];
      row += apScoreCell(eg.exam.best_ap_score, eg.exam).replace('<td', `<td rowspan="${eg.count}"`);
    }

    // Pacing column (per row)
    if (!isExamOnly) {
      row += pacingCell(course.xp_needed_per_day);
    }

    row += '</tr>';
    html += row;
  }
  tbody.innerHTML = html;
}

// ── Render: By Course ───────────────────────────
function renderByCourse(data) {
  const courseRows = [];
  for (const exam of data) {
    for (const course of exam.courses) {
      courseRows.push({exam, course});
    }
  }
  courseRows.sort((a,b) =>
    a.course.course.localeCompare(b.course.course) || a.exam.student_name.localeCompare(b.exam.student_name)
  );

  const thead = document.querySelector('#mainTable thead');
  thead.innerHTML = MAIN_GROUP_HEADER + MAIN_COL_HEADER;

  const groups = {};
  courseRows.forEach(r => {
    const key = r.course.course;
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  const tbody = document.querySelector('#mainTable tbody');
  let html = '';
  let gi = 0;
  const ncols = 14;
  for (const [courseName, rows] of Object.entries(groups)) {
    const plat = rows[0].course.platform;
    html += `<tr class="course-group-header"><td colspan="${ncols}">
      ${platformBadge(plat)} &nbsp; ${esc(courseName)}
      <span style="font-weight:400;font-size:12px;color:#94a3b8;margin-left:12px">${rows.length} student${rows.length>1?'s':''}</span>
    </td></tr>`;
    const parity = gi % 2 === 0 ? '' : 'group-even';
    for (const r of rows) {
      const {exam, course} = r;
      const statusCls = exam.exam_status === 'confirmed' ? 'exam-confirmed' : 'exam-questionable';
      html += `<tr class="${parity}">`;
      // Identity
      html += `<td class="sticky-left">${esc(exam.student_name)}</td>`;
      html += `<td class="sticky-left-2">${esc(exam.grade)}</td>`;
      html += `<td>${esc(exam.guide)}</td>`;
      html += `<td class="${statusCls}">${examIcon(exam.exam_status)}${esc(exam.ap_test)}</td>`;
      html += coursePlatformCell(course.course, course.platform);
      // Progress
      html += `<td>${completionCell(course.completion_pct)}</td>`;
      html += `<td style="white-space:normal">${unitBlocks(course.units)}</td>`;
      html += `<td>${accBadge(course.accuracy, course.mcq_accuracy, course.frq_accuracy)}</td>`;
      // Effort
      html += timeCell(course.time_4w_min_per_day);
      html += `<td>${course.xp_per_school_day_4w != null ? fmt(course.xp_per_school_day_4w,1) : '\u2014'}</td>`;
      html += effCell(course.min_per_xp_4w);
      html += lastActiveCell(course.last_active);
      // AP Score
      html += apScoreCell(exam.best_ap_score, exam);
      // Pacing
      html += pacingCell(course.xp_needed_per_day);
      html += '</tr>';
    }
    gi++;
  }
  tbody.innerHTML = html;
}

// ── Render: By Practice Test ────────────────────
function renderByPracticeTest(data) {
  // Sort by student name, then AP test, then date
  data = [...data].sort((a,b) =>
    a.student_name.localeCompare(b.student_name) ||
    a.ap_test.localeCompare(b.ap_test) ||
    (a.test_date || '').localeCompare(b.test_date || '')
  );

  const thead = document.querySelector('#mainTable thead');
  thead.innerHTML = `<tr class="group-header-row">
    <th colspan="5" class="grp-identity sticky-left" style="left:0">Identity</th>
    <th colspan="2" class="grp-progress">Test</th>
    <th colspan="3" class="grp-ap-score">Results</th>
  </tr>
  <tr class="col-header-row">
    <th class="sticky-left" style="min-width:150px">Student</th>
    <th class="sticky-left-2" style="min-width:50px">Grade</th>
    <th style="min-width:100px">Guide</th>
    <th style="min-width:160px">AP Test</th>
    <th style="min-width:160px">Test Name</th>
    <th style="min-width:90px">Date</th>
    <th style="min-width:65px">AP Score</th>
    <th style="min-width:70px">MCQ %</th>
    <th style="min-width:70px">FRQ %</th>
  </tr>`;

  const tbody = document.querySelector('#mainTable tbody');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="exam-only-placeholder" style="text-align:center;padding:24px">No practice test data available</td></tr>';
    return;
  }

  // Compute student groups and exam groups for rowspan
  const studentGroups = [];
  const examGroups = [];
  let si = 0;
  while (si < data.length) {
    const sid = data[si].student_alpha_id;
    const sStart = si;
    while (si < data.length && data[si].student_alpha_id === sid) {
      const eStart = si;
      const eTest = data[si].ap_test;
      while (si < data.length && data[si].student_alpha_id === sid && data[si].ap_test === eTest) si++;
      examGroups.push({start: eStart, count: si - eStart, row: data[eStart]});
    }
    studentGroups.push({start: sStart, count: si - sStart, row: data[sStart]});
  }

  const sGroupOf = new Array(data.length);
  studentGroups.forEach((g,gi) => { for (let i=g.start; i<g.start+g.count; i++) sGroupOf[i]=gi; });
  const eGroupStart = new Set(examGroups.map(g=>g.start));
  const eGroupMap = {};
  examGroups.forEach(g => { eGroupMap[g.start] = g; });
  const sGroupStart = new Set(studentGroups.map(g=>g.start));
  const sGroupMap = {};
  studentGroups.forEach(g => { sGroupMap[g.start] = g; });

  let html = '';
  for (let i = 0; i < data.length; i++) {
    const r = data[i];
    const groupParity = sGroupOf[i] % 2 === 0 ? '' : 'group-even';
    let row = `<tr class="${groupParity}">`;

    // Student columns (rowspan student): Student Name, Grade, Guide
    if (sGroupStart.has(i)) {
      const sg = sGroupMap[i];
      row += `<td class="sticky-left" rowspan="${sg.count}">${esc(sg.row.student_name)}</td>`;
      row += `<td class="sticky-left-2" rowspan="${sg.count}">${esc(sg.row.grade)}</td>`;
      row += `<td rowspan="${sg.count}">${esc(sg.row.guide)}</td>`;
    }

    // AP Test column (rowspan exam)
    if (eGroupStart.has(i)) {
      const eg = eGroupMap[i];
      const statusCls = eg.row.exam_status === 'confirmed' ? 'exam-confirmed' : 'exam-questionable';
      row += `<td rowspan="${eg.count}" class="${statusCls}">${examIcon(eg.row.exam_status)}${esc(eg.row.ap_test)}</td>`;
    }

    // Per-test columns
    row += `<td>${esc(r.test_name)}</td>`;
    row += `<td>${esc(r.test_date)}</td>`;
    row += apScoreCell(r.ap_score);
    row += `<td>${accBadgeSimple(r.mcq_accuracy)}</td>`;
    row += `<td>${accBadgeSimple(r.frq_accuracy)}</td>`;
    row += '</tr>';
    html += row;
  }
  tbody.innerHTML = html;
}

// ── Main render dispatch ────────────────────────
let viewMode = 'student';

function render() {
  if (viewMode === 'practice') {
    const filtered = applyFiltersPractice(PRACTICE_TESTS);
    document.getElementById('summary').textContent =
      `Showing ${filtered.length} practice tests`;
    renderByPracticeTest(filtered);
  } else {
    const filtered = applyFilters(DATA);
    const students = new Set(filtered.map(r => r.student_alpha_id));
    const totalCourses = filtered.reduce((s, r) => s + Math.max(r.courses.length, 1), 0);
    document.getElementById('summary').textContent =
      `Showing ${students.size} of ${new Set(DATA.map(r=>r.student_alpha_id)).size} students, ${filtered.length} exams, ${totalCourses} rows`;

    if (viewMode === 'student') renderByStudent(filtered);
    else renderByCourse(filtered);
  }
}

// ── Event listeners ─────────────────────────────
document.getElementById('search').addEventListener('input', render);
document.getElementById('filterGuide').addEventListener('change', render);
document.getElementById('filterApTest').addEventListener('change', render);
document.getElementById('filter').addEventListener('change', render);

function setViewMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).click;
  if (mode === 'student') document.getElementById('btn-student').classList.add('active');
  else if (mode === 'course') document.getElementById('btn-course').classList.add('active');
  else document.getElementById('btn-practice').classList.add('active');
  render();
}

document.getElementById('btn-student').addEventListener('click', () => setViewMode('student'));
document.getElementById('btn-course').addEventListener('click', () => setViewMode('course'));
document.getElementById('btn-practice').addEventListener('click', () => setViewMode('practice'));

// Initial render
render();
</script>
</body>
</html>
